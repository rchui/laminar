name: integration
on: [push]

jobs:
  test:
    name: ${{ matrix.os }} - python${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    env:
      PY_COLORS: '1'

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install
        run: make env

      - name: test
        run: make test

  build:
    name: build artifacts
    runs-on: ubuntu-latest
    needs: [test]
    env:
      PY_COLORS: '1'

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.10'

      - name: install
        run: make setup

      - name: build
        run: make build

      - name: check
        run: make check

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  promote:
    name: promote artifacts
    runs-on: ubuntu-latest
    needs: [build]
    if: "success() && startsWith(github.ref, 'refs/tags/')"
    env:
      PY_COLORS: '1'

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.10'
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: install
        run: make setup

      - name: check
        run: make check

      - name: tag
        run: make tag

      - name: promote
        run: uv run twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
